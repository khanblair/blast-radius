# Ingests the dbt project's models, lineage, and docs. `target_platform`
# must equal postgres_to_datahub.yml's `type`; `env` and
# `convert_urns_to_lowercase` must match it exactly so the resulting dbt
# entities' upstreamLineage correctly bridges to the raw-Postgres-ingested
# URNs for the same physical tables (see feedback-notes.md).
#
# manifest_path/catalog_path/run_results_paths are driven by DBT_PROJECT_DIR
# in .env (an absolute path, machine-specific) -- regenerate the artifacts
# via `dbt build && dbt docs generate` after cloning elsewhere.
source:
  type: "dbt"
  config:
    manifest_path: "${DBT_PROJECT_DIR}/target/manifest.json"
    catalog_path: "${DBT_PROJECT_DIR}/target/catalog.json"
    run_results_paths:
      - "${DBT_PROJECT_DIR}/target/run_results.json"

    target_platform: "postgres"
    env: "PROD"
    convert_urns_to_lowercase: false

    infer_dbt_schemas: true
    include_column_lineage: true

sink:
  type: "datahub-rest"
  config:
    server: "${DATAHUB_GMS_URL}"
