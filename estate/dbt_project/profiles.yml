blast_radius_estate:
  target: dev
  outputs:
    dev:
      type: postgres
      host: "{{ env_var('PG_HOST', 'localhost') }}"
      port: "{{ env_var('PG_PORT', '5433') | int }}"
      user: "{{ env_var('PG_USER', 'postgres_user') }}"
      password: "{{ env_var('PG_PASSWORD', 'postgres_password') }}"
      dbname: "{{ env_var('PG_DATABASE', 'warehouse') }}"
      schema: public
      threads: 4
